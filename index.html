<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QwynxChat - Premium Private Connection</title>
    <meta name="theme-color" content="#0084ff">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chat.css">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="chat.js"></script>
    <style>

    </style>
</head>
<body>
    <!-- Setup Screen -->
    <div class="setup-screen active" id="setupScreen">
        <div class="setup-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-comments" style="color: white; font-size: 32px;"></i>
                </div>
                <h1>QwynxChat</h1>
                <p>Premium Private Connection</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('create')">Create Room</button>
                <button class="tab" onclick="switchTab('join')">Join Room</button>
            </div>

            <div class="tab-panel active" id="createPanel">
                <div class="input-group">
                    <label class="input-label">Your Name</label>
                    <input type="text" class="input-field" id="createUsername" placeholder="Enter your name">
                </div>
                <button class="btn-primary" onclick="createRoom()">
                    <i class="fas fa-plus"></i> Create Private Room
                </button>

                <div class="code-display" id="codeDisplay" style="padding: 20px;">
                    <div style="text-align: center; margin-bottom: 16px;">
                        <span style="font-size: 32px; font-weight: 800; color: var(--accent); letter-spacing: 6px; font-family: monospace;" id="roomCode"></span>
                    </div>
                    
                    <button class="btn-copy" onclick="copyRoomCode()" style="width: 100%; padding: 12px; font-size: 14px; margin-bottom: 12px;">
                        <i class="fas fa-copy"></i> Copy Code & Share
                    </button>
                    
                    <p style="color: var(--text-secondary); font-size: 12px; text-align: center;">
                        <i class="fas fa-circle-notch fa-spin" style="color: var(--accent);"></i> 
                        Share this 8-digit code with your friend
                    </p>
                </div>
            </div>

            <div class="tab-panel" id="joinPanel">
                <div class="input-group">
                    <label class="input-label">Your Name</label>
                    <input type="text" class="input-field" id="joinUsername" placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label class="input-label" style="font-weight: 600;">
                        <i class="fas fa-hashtag"></i> Enter 8-Digit Room Code
                    </label>
                    <input type="text" class="input-field" id="roomCodeInput" placeholder="E.g., 7B5125DC" maxlength="8" style="text-transform: uppercase; font-family: monospace; letter-spacing: 4px; text-align: center; font-size: 24px; font-weight: 700; padding: 16px;">
                </div>
                <button class="btn-primary" id="joinRoomBtn" onclick="joinRoom()">
                    <i class="fas fa-sign-in-alt"></i> Join Room
                </button>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div class="chat-screen" id="chatScreen">
        <div class="header">
            <div class="header-left">
                <div class="user-avatar" id="userAvatar">
                    <span id="avatarInitial">?</span>
                    <div class="online-indicator" id="onlineIndicator"></div>
                </div>
                <div class="peer-info">
                    <span class="peer-name" id="peerName">Connecting...</span>
                    <span class="peer-status" id="peerStatus">online</span>
                </div>
            </div>
            <div class="header-right">
                <button class="call-btn" onclick="startVoiceCall()" title="Voice Call">
                    <i class="fas fa-phone"></i>
                </button>
                <button class="menu-btn" onclick="toggleChatMenu()" title="Menu">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
        </div>

        <!-- Chat Menu Dropdown -->
        <div class="chat-menu" id="chatMenu">
            <div class="menu-item" onclick="toggleEncryption(); toggleChatMenu();">
                <i class="fas fa-lock"></i>
                <span>Secret Chat</span>
                <span class="menu-badge" id="encryptBadge">OFF</span>
            </div>
            <div class="menu-item" onclick="toggleChatTheme(); toggleChatMenu();">
                <i class="fas fa-moon"></i>
                <span>Dark Mode</span>
            </div>
            <div class="menu-divider"></div>
            <div class="menu-item" onclick="clearChat(); toggleChatMenu();">
                <i class="fas fa-broom"></i>
                <span>Clear Chat</span>
            </div>
            <div class="menu-item" onclick="exportChat(); toggleChatMenu();">
                <i class="fas fa-download"></i>
                <span>Export Chat</span>
            </div>
            <div class="menu-divider"></div>
            <div class="menu-item" id="muteSoundsMenuItem" onclick="toggleMuteSounds(); toggleChatMenu();">
                <i class="fas fa-volume-up" id="muteSoundsIcon"></i>
                <span id="muteSoundsText">Mute Sounds</span>
            </div>
            <div class="menu-item danger" onclick="disconnectChat(); toggleChatMenu();">
                <i class="fas fa-sign-out-alt"></i>
                <span>Leave Chat</span>
            </div>
        </div>

        <!-- Mini Call Indicator (shows when in call) -->
        <div class="mini-call-indicator" id="miniCallIndicator" onclick="goToCall()" style="display: none;">
            <div class="mini-call-icon">
                <i class="fas fa-phone"></i>
            </div>
            <div class="mini-call-info">
                <span class="mini-call-text">On Call</span>
                <span class="mini-call-timer" id="miniCallTimer">00:00</span>
            </div>
            <div class="mini-call-wave">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="messages-area" id="messagesArea"></div>
        <div class="typing-bubble" id="typingBubble">
            <span class="typing-name" id="typingName"></span> is typing
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <button class="audio-btn" id="audioBtn" onclick="toggleAudioRecording()">
                    <i class="fas fa-microphone"></i>
                </button>
                <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1" onkeydown="handleInputKeydown(event)" oninput="handleTyping()"></textarea>
                <button class="send-button" onclick="sendMessage()">
                    <i class="fas fa-location-arrow"></i>
                </button>
            </div>
            <div class="audio-recording" id="audioRecording">
                <div class="recording-indicator">
                    <span class="recording-dot"></span>
                    <span id="recordingTime">00:00</span>
                </div>
                <button class="stop-recording-btn" onclick="stopAudioRecording()">
                    <i class="fas fa-stop"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Incoming Call Dialog -->
    <div class="incoming-call-modal" id="incomingCallModal">
        <div class="incoming-call-container">
            <!-- Top: Caller Info -->
            <div class="incoming-call-header">
                <div class="incoming-call-avatar" id="incomingAvatar">?</div>
                <div class="incoming-call-info">
                    <div class="incoming-call-name" id="incomingName">User</div>
                    <div class="incoming-call-text">Incoming Call...</div>
                </div>
            </div>
            <!-- Bottom: Action Buttons -->
            <div class="incoming-call-actions">
                <button class="incoming-btn decline" onclick="declineCall()">
                    <div class="btn-icon"><i class="fas fa-phone-slash"></i></div>
                    <span>Decline</span>
                </button>
                <button class="incoming-btn accept" onclick="acceptCall()">
                    <div class="btn-icon"><i class="fas fa-phone"></i></div>
                    <span>Accept</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Call Modal -->
    <div class="call-modal" id="callModal">
        <div class="call-container">
            <!-- Top Bar: Profile left, Timer + Chat Toggle right -->
            <div class="call-top-bar">
                <div class="call-profile">
                    <div class="call-avatar-small" id="callTopAvatar">
                        <span id="callTopAvatarInitial">?</span>
                    </div>
                    <div class="call-profile-info">
                        <div class="call-profile-name" id="callProfileName">User</div>
                        <div class="call-profile-status" id="callProfileStatus">Calling...</div>
                        <div class="remote-mute-indicator" id="remoteMuteIndicator" style="display: none;">
                            <i class="fas fa-microphone-slash"></i> Muted
                        </div>
                    </div>
                </div>
                <div class="call-top-right">
                    <div class="local-status" id="localStatus" style="display: none;">
                        <i id="localStatusIcon" class="fas"></i>
                        <span id="localStatusText"></span>
                    </div>
                    <div class="call-timer" id="callTimer"></div>
                    <button class="chat-toggle-btn" id="chatToggleBtn" onclick="goToChat();" title="Back to Chat">
                        <i class="fas fa-comment"></i>
                    </button>
                </div>
            </div>
            
            <!-- Center: Wave Animation -->
            <div class="call-center">
                <div class="wave-container" id="waveContainer">
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                </div>
                <div class="call-avatar-large" id="callAvatar" style="display: none;">
                    <span id="callAvatarInitial">?</span>
                </div>
            </div>
            
            <!-- Hidden video elements for WebRTC -->
            <video id="localVideo" autoplay playsinline muted style="display: none;"></video>
            <video id="remoteVideo" autoplay playsinline style="display: none;"></video>
            
            <!-- Bottom controls with common background -->
            <div class="call-controls-container">
                <div class="call-controls">
                    <button class="call-control-btn mute" id="muteBtn" onclick="toggleMute()">
                        <div class="btn-icon"><i class="fas fa-microphone"></i></div>
                        <span>Mute</span>
                    </button>
                    <div class="audio-dropdown-container">
                        <button class="call-control-btn audio-output" id="audioOutputBtn" onclick="toggleAudioDropdown()">
                            <div class="btn-icon" id="audioOutputIcon"><i class="fas fa-volume-up"></i></div>
                            <span id="audioOutputLabel">Audio</span>
                        </button>
                        <div class="audio-dropdown" id="audioDropdown" style="display: none;">
                            <div class="audio-option" id="optionSpeaker" onclick="setAudioOutput('speaker')">
                                <i class="fas fa-volume-up"></i> Speaker
                            </div>
                            <div class="audio-option" id="optionEarphone" onclick="setAudioOutput('earphone')">
                                <i class="fas fa-headphones"></i> Earphone
                            </div>
                            <div class="audio-option" id="optionBluetooth" onclick="setAudioOutput('bluetooth')">
                                <i class="fab fa-bluetooth-b"></i> Bluetooth
                            </div>
                        </div>
                    </div>
                    <button class="call-control-btn end" onclick="endCall();">
                        <div class="btn-icon"><i class="fas fa-phone" style="transform: rotate(135deg);"></i></div>
                        <span>End</span>
                    </button>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
